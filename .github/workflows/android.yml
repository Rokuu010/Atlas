name: Android build

# Builds an installable debug APK on a free Ubuntu runner (no Mac, no signing dance —
# a debug APK is self-signed and installs directly on any Android phone with
# "install unknown apps" enabled).
#
# Run it from the GitHub UI: Actions ▸ "Android build" ▸ Run workflow.

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate category dataset
        run: python scripts/generate_categories.py --output android/app/src/main/assets/categories.json

      # Cache the SigLIP checkpoint so it is downloaded from the HF Hub once, then reused —
      # avoids re-pulling ~400 MB (and tripping HF's unauthenticated rate limits) every run.
      - name: Cache Hugging Face hub (SigLIP checkpoint)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-hub-vitb16-siglip-webli-v1

      # Fatal on failure: the analysis model is required, so a failed export must fail the
      # build (it previously continued silently, shipping a model-less APK that shows the
      # "setup required" screen). CPU-only torch avoids pulling the multi-GB CUDA wheel —
      # the most common cause of this step failing on a runner.
      - name: Generate model + text vectors
        env:
          # Optional: add an HF_TOKEN repo secret for authenticated downloads (higher rate
          # limits, no throttling). Works unauthenticated if unset. hf_transfer + an explicit
          # timeout make the ~400 MB checkpoint download fast and non-hanging.
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_ENABLE_HF_TRANSFER: "1"
          HF_HUB_DOWNLOAD_TIMEOUT: "60"
        run: |
          python -m pip install --upgrade pip
          # torch AND torchvision must come from the SAME CPU index — open_clip imports
          # torchvision at load, and a PyPI (CUDA) torchvision against a CPU torch fails with
          # "operator torchvision::nms does not exist". This mirrors the working iOS recipe.
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          # onnxscript: required by torch.onnx.export in torch 2.9+. hf_transfer: robust download.
          pip install open_clip_torch transformers sentencepiece numpy onnx onnxruntime onnxscript hf_transfer
          python scripts/precompute_text_embeddings.py --output android/app/src/main/assets/category_text_embeddings.bin
          python scripts/convert_siglip_onnx.py

      - name: Verify model assets are bundled
        run: |
          set -e
          onnx="android/app/src/main/assets/siglip_image_encoder.onnx"
          vec="android/app/src/main/assets/category_text_embeddings.bin"
          test -s "$onnx" || { echo "::error::missing $onnx"; exit 1; }
          test -s "$vec"  || { echo "::error::missing $vec"; exit 1; }
          # The ONNX encoder must be a real model (MB-scale), not an empty/stub file.
          bytes=$(wc -c < "$onnx")
          [ "$bytes" -gt 1000000 ] || { echo "::error::$onnx is only $bytes bytes — export failed"; exit 1; }
          ls -lh "$onnx" "$vec"

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        run: gradle -p android assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tastecard-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
