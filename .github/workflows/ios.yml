name: iOS build & test

# Cloud build on a GitHub-hosted macOS runner — no local Mac required.
# - `test` job: generates the project, compiles the app, runs the XCTest suite (fast;
#   needs no model). This is the definitive "does it compile?" check.
# - `ipa` job: also generates the Core ML model + text vectors, then builds an UNSIGNED
#   IPA you download and sideload with Sideloadly/AltStore (free Apple ID, 7-day install).
#
# Runs on macos-15 with the latest stable Xcode (16.x) — XcodeGen emits the Xcode 16
# project format (objectVersion 77), which older Xcode (15.x) cannot open.
#
# Run it from the GitHub UI: Actions ▸ "iOS build & test" ▸ Run workflow.
# Public repos get unlimited free macOS minutes; private repos consume your quota at 10×.

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  test:
    name: Compile + unit tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build & test (iPhone simulator)
        run: |
          xcodebuild test \
            -project Tastecard.xcodeproj \
            -scheme Tastecard \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO

  ipa:
    name: Build sideload-ready IPA
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate category dataset
        run: python scripts/generate_categories.py

      # Cache the SigLIP checkpoint so it is downloaded from the HF Hub once, then reused —
      # avoids re-pulling ~400 MB (and tripping HF's unauthenticated rate limits) every run.
      - name: Cache Hugging Face hub (SigLIP checkpoint)
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/huggingface
          key: hf-hub-vitb16-siglip-webli-v1

      # Non-fatal: if the SigLIP→Core ML conversion needs another pass, the IPA still
      # builds (the app shows its "setup required" screen until the model is bundled).
      # CPU-only torch avoids the multi-GB CUDA wheel — the usual cause of this step failing.
      - name: Generate Core ML model + text vectors
        continue-on-error: true
        env:
          # Optional HF_TOKEN secret => authenticated, un-throttled downloads. hf_transfer +
          # an explicit timeout keep the ~400 MB checkpoint download fast and non-hanging.
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_ENABLE_HF_TRANSFER: "1"
          HF_HUB_DOWNLOAD_TIMEOUT: "60"
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          # open_clip's SigLIP tokenizer is a Hugging Face SentencePiece tokenizer,
          # so transformers + sentencepiece are required in addition to torch/coremltools.
          pip install open_clip_torch transformers sentencepiece coremltools numpy hf_transfer
          python scripts/precompute_text_embeddings.py
          python scripts/convert_siglip_coreml.py

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive (no signing)
        run: |
          xcodebuild archive \
            -project Tastecard.xcodeproj \
            -scheme Tastecard \
            -configuration Release \
            -archivePath build/Tastecard.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Package unsigned IPA
        run: |
          APP_PATH="build/Tastecard.xcarchive/Products/Applications/Tastecard.app"
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          (cd build && zip -qry Tastecard-unsigned.ipa Payload)
          ls -lh build/Tastecard-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tastecard-unsigned-ipa
          path: build/Tastecard-unsigned.ipa
          if-no-files-found: error
