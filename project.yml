# XcodeGen project definition for Tastecard.
# Generate the Xcode project on macOS with:  brew install xcodegen && xcodegen generate
# Rationale (see README): the project is defined declaratively here rather than as a
# hand-written .pbxproj so it is human-verifiable and deterministic.

name: Tastecard

options:
  bundleIdPrefix: io.tastecard
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""              # <-- set your Apple Developer Team ID
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    GCC_TREAT_WARNINGS_AS_ERRORS: NO

targets:
  Tastecard:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Tastecard
        excludes:
          - "Resources/Fonts/README.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.tastecard.app
        PRODUCT_NAME: Tastecard
        INFOPLIST_FILE: Tastecard/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"     # iPhone only
        SUPPORTS_MACCATALYST: NO
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        # The privacy manifest ships inside the app bundle.
        # Resources/ holds the bundled dataset, fonts, and (once generated) the model.

  TastecardTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: TastecardTests
    dependencies:
      - target: Tastecard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.tastecard.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Tastecard:
    build:
      targets:
        Tastecard: all
        TastecardTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - TastecardTests
    archive:
      config: Release
